  <div class="hud-left">
    <!-- ADDED: score pill (kills × 10 points) -->
    <div class="hud-pill" id="p-score">
      <span class="hud-lbl">Score</span>
      <span class="hud-val" id="el-score">0</span>
    </div>
    <!-- kills count -->
    <div class="hud-pill" id="p-kills">
      <span class="hud-lbl">Kills</span>
      <span class="hud-val" id="el-kills">0</span>
    </div>
  </div>

  <!-- Center: time -->
  <div class="hud-pill" id="p-time">
    <span class="hud-lbl">Time</span>
    <!-- CHANGED: starts at 30 -->
    <span class="hud-val" id="el-time">30</span>
  </div>

  <!-- Right: health hearts (2 lives — enemy hits only) -->
  <div id="p-health">
    <span class="hud-lbl">Health</span>
    <div class="hud-hearts">
      <span class="heart" id="heart-1">❤️</span>
      <span class="heart" id="heart-2">❤️</span>
    </div>
  </div>
</div>

<!-- ----------------------------------------------------------------
     UI BLOCK: MOBILE CONTROLS
---------------------------------------------------------------- -->
<div id="mob">
  <button class="mob-btn" id="mb-jump">&#x2191;</button>
  <button class="mob-btn" id="mb-shoot">WEB</button>
</div>

<!-- ----------------------------------------------------------------
     UI BLOCK: END SCREEN
     CHANGED: only shows Total Kills + Total Score (no coins)
---------------------------------------------------------------- -->
<div id="end" class="screen off">
  <div class="end-card">
    <div class="end-badge" id="el-badge">&#x2605;</div>
    <h2  class="end-title" id="el-etitle">YOU WIN!</h2>
    <p   class="end-sub"   id="el-esub">Mission Complete</p>

    <!-- CHANGED: only 2 stats — kills + score -->
    <div class="end-stats">
      <div class="end-stat">
        <span class="end-sv" id="el-ek">0</span>
        <span class="end-sl">Total Kills</span>
      </div>
      <div class="end-stat">
        <span class="end-sv" id="el-es">0</span>
        <span class="end-sl">Total Score</span>
      </div>
    </div>

    <p class="end-hs" id="el-ehs"></p>
    <button class="btn-restart" id="btn-restart">PLAY AGAIN</button>
  </div>
</div>

<!-- External JS -->
<script src="game.js"></script>
</body>
</html>
